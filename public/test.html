<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Психологический тест - Squad Finder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/test.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-brain"></i> Психологический тест</h1>
        <p>Поможем найти идеальных тиммейтов на основе вашего стиля игры</p>
    </div>

    <div class="card">
        <div id="testProgress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text">
                <span>Вопрос <span id="currentQuestion">1</span> из <span id="totalQuestions">15</span></span>
                <span class="progress-stats" id="progressStats">Отвечено: 0/15</span>
            </div>
        </div>

        <div id="testContainer">

            <div id="questionCard" style="margin-top: 20px">
                <h3 id="questionText"></h3>
                <div id="optionsContainer" class="options-container"></div>
                <div class="navigation-buttons">
                    <button id="prevBtn" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Назад
                    </button>
                    <button id="nextBtn" class="btn btn-primary">
                        Далее <i class="fas fa-arrow-right"></i>
                    </button>
                    <button id="submitTestBtn" class="btn btn-success" style="display: none;">
                        <i class="fas fa-paper-plane"></i> Отправить результаты
                    </button>
                </div>
            </div>
        </div>

        <div id="resultsContainer" style="display: none;">
            <h2><i class="fas fa-chart-pie"></i> Ваш психологический портрет</h2>
            <div id="traitsResults" class="traits-container"></div>
            <button id="findTeamsBtn" class="btn btn-primary">
                <i class="fas fa-users"></i> Найти подходящие команды
            </button>
        </div>
    </div>
</div>
<footer class="footer">
    <p>© 2026 Squad Finder. Все права защищены.</p>
    <p style="margin-top: 10px;">
        <a href="/privacy.html" style="color: rgba(255,255,255,0.7); text-decoration: none; margin: 0 10px;">
            <i class="fas fa-shield-alt"></i> Политика конфиденциальности
        </a>
    </p>
</footer>
<script src="/js/dialog.js"></script>
<script src="/js/test.js"></script>
<script src="/js/chat.js"></script>
</body>
</html>
