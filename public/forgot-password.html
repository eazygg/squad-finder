<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля - Squad Finder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .forgot-container {
            max-width: 450px;
            margin: 100px auto;
            padding: 20px;
        }
        .forgot-card {
            background: linear-gradient(135deg, #1e1e32, #16162a);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        .forgot-card h2 {
            color: #fff;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            word-break: break-all;
        }
        .message.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
            color: #10b981;
            display: block;
        }
        .message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
            display: block;
        }
        .reset-link {
            margin-top: 15px;
            padding: 10px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 8px;
            word-break: break-all;
        }
        .reset-link a {
            color: #3b82f6;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #3b82f6;
            text-decoration: none;
        }
        .btn-copy {
            background: rgba(59, 130, 246, 0.3);
            border: none;
            color: #3b82f6;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>
<div class="forgot-container">
    <div class="forgot-card">
        <h2><i class="fas fa-key"></i> Восстановление пароля</h2>
        <p>Введите email, указанный при регистрации. Мы покажем ссылку для сброса пароля.</p>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" placeholder="example@mail.com">
        </div>

        <button class="btn btn-primary" id="sendResetBtn" style="width: 100%;">
            <i class="fas fa-paper-plane"></i> Восстановить
        </button>

        <div id="message" class="message"></div>
        <div id="resetLinkDiv" class="reset-link" style="display: none;"></div>

        <a href="/" class="back-link">
            <i class="fas fa-arrow-left"></i> Вернуться на главную
        </a>
    </div>
</div>

<script>
    document.getElementById('sendResetBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const messageDiv = document.getElementById('message');
        const resetLinkDiv = document.getElementById('resetLinkDiv');

        if (!email) {
            messageDiv.className = 'message error';
            messageDiv.textContent = 'Введите email';
            resetLinkDiv.style.display = 'none';
            return;
        }

        messageDiv.className = 'message';
        messageDiv.textContent = 'Проверка...';
        messageDiv.style.display = 'block';
        resetLinkDiv.style.display = 'none';

        try {
            const response = await fetch('/api/password-reset/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await response.json();

            if (response.ok) {
                messageDiv.className = 'message success';
                messageDiv.textContent = '✅ Ссылка для сброса пароля создана!';

                // Показываем ссылку
                resetLinkDiv.style.display = 'block';
                resetLinkDiv.innerHTML = `
                    <strong>Ссылка для сброса пароля:</strong><br>
                    <a href="${data.resetUrl}" target="_blank">${data.resetUrl}</a>
                    <br><br>
                    <small>Ссылка действительна 1 час. Скопируйте и вставьте в браузер.</small>
                `;
                document.getElementById('email').value = '';
            } else {
                messageDiv.className = 'message error';
                messageDiv.textContent = data.error;
            }
        } catch (error) {
            messageDiv.className = 'message error';
            messageDiv.textContent = 'Ошибка соединения с сервером';
        }
    });
</script>
</body>
</html>
