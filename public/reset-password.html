<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новый пароль - Squad Finder</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .reset-container {
      max-width: 450px;
      margin: 100px auto;
      padding: 20px;
    }
    .reset-card {
      background: linear-gradient(135deg, #1e1e32, #16162a);
      border-radius: 20px;
      padding: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }
    .reset-card h2 {
      color: #fff;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.8);
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: white;
      font-size: 14px;
    }
    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
    }
    .message {
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }
    .message.success {
      background: rgba(16, 185, 129, 0.2);
      border: 1px solid #10b981;
      color: #10b981;
      display: block;
    }
    .message.error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid #ef4444;
      color: #ef4444;
      display: block;
    }
  </style>
</head>
<body>
<div class="reset-container">
  <div class="reset-card">
    <h2><i class="fas fa-lock"></i> Новый пароль</h2>

    <div class="form-group">
      <label>Новый пароль:</label>
      <input type="password" id="password" placeholder="Минимум 6 символов">
    </div>

    <div class="form-group">
      <label>Подтверждение пароля:</label>
      <input type="password" id="confirmPassword" placeholder="Повторите пароль">
    </div>

    <button class="btn btn-primary" id="resetBtn" style="width: 100%;">
      <i class="fas fa-check"></i> Сохранить пароль
    </button>

    <div id="message" class="message"></div>
  </div>
</div>

<script>
  // Получаем токен из URL
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');

  if (!token) {
    document.getElementById('message').className = 'message error';
    document.getElementById('message').textContent = 'Недействительная ссылка';
  }

  document.getElementById('resetBtn').addEventListener('click', async () => {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    const messageDiv = document.getElementById('message');

    if (!password || !confirm) {
      messageDiv.className = 'message error';
      messageDiv.textContent = 'Заполните оба поля';
      return;
    }

    if (password !== confirm) {
      messageDiv.className = 'message error';
      messageDiv.textContent = 'Пароли не совпадают';
      return;
    }

    if (password.length < 6) {
      messageDiv.className = 'message error';
      messageDiv.textContent = 'Пароль должен быть минимум 6 символов';
      return;
    }

    messageDiv.className = 'message';
    messageDiv.textContent = 'Сохранение...';
    messageDiv.style.display = 'block';

    try {
      const response = await fetch('/api/password-reset/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: password })
      });

      const data = await response.json();

      if (response.ok) {
        messageDiv.className = 'message success';
        messageDiv.textContent = data.message;
        setTimeout(() => {
          window.location.href = '/';
        }, 2000);
      } else {
        messageDiv.className = 'message error';
        messageDiv.textContent = data.error;
      }
    } catch (error) {
      messageDiv.className = 'message error';
      messageDiv.textContent = 'Ошибка соединения';
    }
  });
</script>
</body>
</html>
